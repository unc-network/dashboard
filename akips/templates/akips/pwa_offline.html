{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>OCNES Offline</title>
    <link rel="icon" href="{% static 'akips/img/favicon.png' %}" type="image/png" />
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(180deg, #f4f6f9 0%, #e9eef3 100%);
            color: #1f2d3d;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            padding: 24px;
        }

        .offline-card {
            max-width: 420px;
            width: 100%;
            background: #ffffff;
            border-radius: 18px;
            box-shadow: 0 18px 40px rgba(31, 45, 61, 0.12);
            padding: 32px 28px;
            text-align: center;
        }

        .offline-card img {
            width: 72px;
            height: 72px;
            margin-bottom: 16px;
        }

        h1 {
            margin: 0 0 12px;
            font-size: 1.75rem;
        }

        p {
            margin: 0 0 20px;
            line-height: 1.5;
        }

        a {
            display: inline-block;
            padding: 12px 18px;
            border-radius: 999px;
            background: #0b7285;
            color: #ffffff;
            text-decoration: none;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <main class="offline-card">
        <img src="{% static 'akips/img/icon-192.png' %}" alt="OCNES icon" />
        <h1>Connection Required</h1>
        <p>The dashboard app is installed, but live OCNES data requires campus or VPN connectivity. Cached monitoring data is intentionally not shown offline.</p>
        <a href="/">Retry Dashboard</a>
    </main>
</body>
</html>
