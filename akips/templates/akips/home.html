{% extends 'akips/base.html' %}
{% load static %}
{% load auth_extras %}

{% block title %}OCNES Dashboard{% endblock %}
{% block extra_head%}
<!-- <meta http-equiv="refresh" content="30"> -->
{% endblock %}

{% block no_heading %}
<div class="row">
    <div class="col-sm-6 my-auto text-left text-sm">
        <div class="custom-control custom-switch">
            <input type="checkbox" class="custom-control-input" id="refresh-toggle" checked>
            <label class="custom-control-label" for="refresh-toggle">Refresh in <span id="time-remain">30</span> seconds</label>
        </div>
    </div>
    <div class="col-sm-6 text-right">
        <button type="button" id="incident_button" class="btn btn-primary btn-sm">Manage Incident</button>
        <button type="button" id="clear_all_traps" class="btn btn-primary btn-sm">Clear All Traps</button>
        <button type="button" id="sync_button" class="btn btn-primary btn-sm" data-url="{% url 'request_sync' %}">Force AKiPS Sync</button>
    </div>
</div> 
{% endblock %}

{% block content %}
<form method="get" id="myForm" action="{% url 'create_incident' %}" data-cards-url="{% url 'dashboard_cards' %}">
    <div id="chart" class="card">
        <div class="card-header">
            <h3 class="card-title">New Event Trends</h3>
        </div>
        <div class="card-body p-0">
            <div class="chart">
                <div class="chartjs-size-monitor">
                    <div class="chartjs-size-monitor-expand">
                        <div class=""></div>
                    </div>
                    <div class="chartjs-size-monitor-shrink">
                        <div class=""></div>
                    </div>
                </div>
            <canvas id="barChart" style="min-height: 100px; height: 100px; max-height: 100px; max-width: 100%; display: block; width: 414px;" width="414" height="250" class="chartjs-render-monitor" data-url="{% url 'chart_data' %}"></canvas>
            </div>
        </div>
    </div>

    <div id="crit_card" class="card card-primary event-card" data-url="{% url 'crit_card' %}">
        <div class="card-body table-responsive p-0">
        </div>
    </div>

    <div id="bldg_card" class="card card-primary event-card" data-url="{% url 'bldg_card' %}">
        <div class="card-body table-responsive p-0">
        </div>
    </div>

    <div id="spec_card" class="card card-primary event-card" data-url="{% url 'spec_card' %}">
        <div class="card-body table-responsive p-0">
        </div>
    </div>

    <div id="trap_card" class="card card-primary event-card" data-url="{% url 'trap_card' %}">
        <div class="card-body table-responsive p-0">
        </div>
    </div>

    <!-- <div class="text-right p-3">
        {% if request.user|has_group:"refresh" %}
        <button type="button" id="sync_button" class="btn btn-primary" data-url="{% url 'request_sync' %}">Request AKiPS Sync</button>
        {% endif %}
        <button type="submit" id="incident_button" class="btn btn-primary">Associate Incident</button>
        <button type="button" id="clear_all_traps" class="btn btn-primary">Clear All Traps</button>
    </div> -->

</form>
{% endblock %}

{% block js %}
<script src="{% static 'admin-lte/plugins/chart.js/Chart.min.js' %}"></script>
<script type="text/javascript">
    function setup_chart() {
        /* ChartJS
        * -------
        * Here we will create a few charts using ChartJS
        */
    
        // Bar Chart
        var barChartCanvas = $('#barChart').get(0).getContext('2d');
        var barChartData = {
            labels  : [],
            datasets: [
            {
                label               : 'Unreachable',
                backgroundColor     : 'rgba(60,141,188,0.9)',
                borderColor         : 'rgba(60,141,188,0.8)',
                pointRadius          : false,
                pointColor          : '#3b8bba',
                pointStrokeColor    : 'rgba(60,141,188,1)',
                pointHighlightFill  : '#fff',
                pointHighlightStroke: 'rgba(60,141,188,1)',
                data                : []
            },
            {
                label               : 'Trap',
                backgroundColor     : 'rgba(210,214,222,1)',
                borderColor         : 'rgba(210,214,222,1)',
                pointRadius          : false,
                pointColor          : 'rgba(210, 214, 222, 1)',
                pointStrokeColor    : '#c1c7d1',
                pointHighlightFill  : '#fff',
                pointHighlightStroke: 'rgba(220,220,220,1)',
                data                : []
            },
            {
                label               : 'Battery',
                backgroundColor     : 'rgba(204,112,113,0.9)',
                borderColor         : 'rgba(204,112,113,0.8)',
                pointRadius          : false,
                pointColor          : 'rgba(204,112,113,1)',
                pointStrokeColor    : '#c1c7d1',
                pointHighlightFill  : '#fff',
                pointHighlightStroke: 'rgba(204,112,113,1)',
                data                : []
            }
            ]
        }
        
        var barChartOptions = {
            maintainAspectRatio : false,
            response : true,
            legend: {
                position: 'right',
                display: true,
            },
            datasetFill : false,
            scales: {
                xAxes: [{
                    gridLines : { display : true },
                    stacked: true
                }],
                yAxes: [{
                    // type: 'logarithmic',
                    gridLines : { display : true },
                    stacked: true,
                    ticks: {
                        min: 0
                    }
                }]
            }
        }

        var barChart = new Chart(barChartCanvas, {
            type: 'bar',
            data: barChartData,
            options: barChartOptions
        })

        refresh_chart(barChart);
        return barChart;
    }
    function refresh_chart( barChart ) {
        var url = $('#barChart').data("url")
        $.ajax({
            type: "GET",
            url: url,
            dataType: "json",
            data: {},
            success: function (result, status, xhr) {
                barChart.data.labels = result['chart_labels'];
                barChart.data.datasets[0].data = result['chart_event_data'];
                barChart.data.datasets[1].data = result['chart_trap_data'];
                barChart.data.datasets[2].data = result['chart_battery_data'];
                barChart.update();

                if (result['above_max_unreachable']) {
                    //alert("above max unreachable");
                    $(document).Toasts('create', {
                        class: 'bg-warning',
                        title: 'AKiPS Max Unreachable Devices Exceeded',
                        body: 'Summary updates are paused because AKiPS reports an excessive number of devices down at once. \
                               You may want to check the \
                               <a href="https://akips.net.unc.edu/status-reporter?mode=unreachable_devices;controls=device;limit=100;refresh=15;title=Unreachable+Devices;ping4=on;ping6=on;snmp=on">AKiPS Unreachable Device Report</a> \
                               directly.',
                        autohide: true,
                        delay: 30000
                    });
                }
            },
            error: function (xhr, status, error) {
                console.log("Unable to refresh chart");
            }
        });
    }
    function refresh_duplicates() {
        $('.dup-data').each(function (index) {
            var now = new Date();
            var last = new Date( $(this).data("last") );
            var FIVE_MIN=5*60*1000;
            if ( (now - last) < FIVE_MIN) {
                //console.log('Date is in the last 5 minutes old');
                $(this).removeClass("bg-primary").addClass("bg-danger");
            }
        });
    }

    function escapeHtml(value) {
        if (value === null || value === undefined) {
            return '';
        }
        return String(value)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#039;');
    }

    function renderTrendCell(trend) {
        if (trend === 'New' || trend === 'Increasing') {
            return '<td class="text-center bg-danger akips_trend d-none d-md-table-cell"><i class="fas fa-caret-up" title="' + escapeHtml(trend) + '"></i></td>';
        }
        if (trend === 'Decreasing') {
            return '<td class="text-center bg-success akips_trend d-none d-md-table-cell"><i class="fas fa-caret-down" title="Decreasing"></i></td>';
        }
        if (trend === 'Recovered') {
            return '<td class="text-center bg-success akips_trend d-none d-md-table-cell"><i class="fas fa-thumbs-up" title="Recovered"></i></td>';
        }
        return '<td class="text-center akips_trend d-none d-md-table-cell"></td>';
    }

    function renderIncidentCell(incident, eventValue, extraClass) {
        var klass = extraClass || '';
        if (incident && incident.url && incident.id) {
            return '<td class="text-center text-primary ' + klass + '"><a href="' + escapeHtml(incident.url) + '" target="_blank">' + escapeHtml(incident.id) + '</a></td>';
        }
        return '<td class="text-center text-primary ' + klass + '"><div class="form-check"><input type="checkbox" class="form-check-input" name="event" value="' + escapeHtml(eventValue) + '"></div></td>';
    }

    function renderSummaryComment(row) {
        if (row.comment) {
            return '<span class="small summary-comment" data-url="' + escapeHtml(row.comment_url) + '"><br>' + escapeHtml(row.comment) + '</span>';
        }
        return '<span class="small summary-comment" data-url="' + escapeHtml(row.comment_url) + '"><i class="fas fa-comment-medical text-primary"></i></span>';
    }

    function renderCritCard(card) {
        var rows = card.rows || [];
        var html = '<table class="table table-hover table-sm"><thead><tr><th>Ack</th><th>Critical Device</th><th>IP Address</th><th>Description</th><th>Last Event</th><th>Trend</th><th class="text-center">Incident</th></tr></thead><tbody>';
        for (var i = 0; i < rows.length; i++) {
            var row = rows[i];
            var ackChecked = row.ack ? ' checked' : '';
            var ackInfo = row.ack ? '<span data-container="body" data-toggle="popover" data-content="Ack by ' + escapeHtml(row.ack_by) + ' at ' + escapeHtml(row.ack_at) + '"><i class="fas fa-info-circle text-primary"></i></span>' : '';
            html += '<tr>' +
                '<td><div class="form-group float-left m-0"><div class="custom-control custom-switch"><input type="checkbox" class="custom-control-input ack-switch" id="ack-switch-' + row.id + '" data-url="' + escapeHtml(row.ack_url) + '"' + ackChecked + '><label class="custom-control-label" for="ack-switch-' + row.id + '"></label></div></div>' + ackInfo + '</td>' +
                '<td><span class="font-weight-bold mr-2"><a href="' + escapeHtml(row.summary_url) + '">' + escapeHtml(row.device_name) + '</a></span>' + renderSummaryComment(row) + '</td>' +
                '<td>' + escapeHtml(row.device_ip4addr) + '</td>' +
                '<td><span class="d-inline-block text-truncate" style="max-width: 200px">' + escapeHtml(row.device_descr) + '</span></td>' +
                '<td>' + escapeHtml(row.last_event) + '</td>' +
                renderTrendCell(row.trend) +
                renderIncidentCell(row.incident, 'summary_' + row.id, '') +
                '</tr>';
        }
        html += '</tbody></table>';
        return html;
    }

    function renderBldgCard(card) {
        var rows = card.rows || [];
        var html = '<table class="table table-hover table-sm"><thead><tr><th>Ack</th><th>Tier1 / Building</th><th class="d-none d-md-table-cell">Switch</th><th class="d-none d-md-table-cell">AP</th><th class="d-none d-md-table-cell">UPS</th><th class="d-none d-md-table-cell">% Affected</th><th>Last Event</th><th class="d-none d-md-table-cell">Trend</th><th class="text-center d-none d-md-table-cell">Incident</th></tr></thead><tbody>';
        for (var i = 0; i < rows.length; i++) {
            var row = rows[i];
            var isDistribution = row.type === 'Distribution';
            var trClass = isDistribution ? ' class="bg-light"' : '';
            var ackCell = '<td></td>';
            if (!isDistribution) {
                var ackChecked = row.ack ? ' checked' : '';
                var ackInfo = row.ack ? '<span data-container="body" data-toggle="popover" data-content="Ack by ' + escapeHtml(row.ack_by) + ' at ' + escapeHtml(row.ack_at) + '"><i class="fas fa-info-circle text-primary"></i></span>' : '';
                ackCell = '<td><div class="form-group float-left m-0"><div class="custom-control custom-switch"><input type="checkbox" class="custom-control-input ack-switch" id="ack-switch-' + row.id + '" data-url="' + escapeHtml(row.ack_url) + '"' + ackChecked + '><label class="custom-control-label" for="ack-switch-' + row.id + '"></label></div></div>' + ackInfo + '</td>';
            }

            var nameIcon = isDistribution ? '<i class="fas fa-caret-down"></i>' : '<i class="fas fa-building"></i>';
            var upsBatteryIcon = row.ups_battery > 0 ? ' <i class="fas fa-battery-three-quarters text-danger"></i>' : '';
            var percentLabel = row.percent_down >= 10 ? '<span class="text-danger">' + escapeHtml(row.percent_down) + '%</span>' : escapeHtml(row.percent_down) + '%';

            html += '<tr' + trClass + '>' +
                ackCell +
                '<td><span class="' + (isDistribution ? 'font-weight-bold' : '') + ' mr-2"><a href="' + escapeHtml(row.summary_url) + '">' + nameIcon + ' ' + escapeHtml(row.name) + '</a></span>' + renderSummaryComment(row) + '</td>' +
                '<td class="d-none d-md-table-cell">' + escapeHtml(row.switch_count) + '</td>' +
                '<td class="d-none d-md-table-cell">' + escapeHtml(row.ap_count) + '</td>' +
                '<td class="d-none d-md-table-cell">' + escapeHtml(row.ups_count) + upsBatteryIcon + '</td>' +
                '<td class="d-none d-md-table-cell">' + percentLabel + '</td>' +
                '<td>' + escapeHtml(row.last_event) + '</td>' +
                renderTrendCell(row.trend) +
                renderIncidentCell(row.incident, 'summary_' + row.id, 'd-none d-md-table-cell') +
                '</tr>';
        }

        if (!rows.length) {
            html += '<tr><td colspan="10" class="text-center">' + escapeHtml(card.empty_message || 'Tier 1 and Building events are currently clear') + '</td></tr>';
        }

        html += '</tbody></table>';
        return html;
    }

    function renderSpecCard(card) {
        var rows = card.rows || [];
        var html = '<table class="table table-hover table-sm"><thead><tr><th>Ack</th><th>Special Grouping</th><th>All</th><th>% Affected</th><th>Last Event</th><th>Trend</th><th class="text-center">Incident</th></tr></thead><tbody>';
        for (var i = 0; i < rows.length; i++) {
            var row = rows[i];
            var ackChecked = row.ack ? ' checked' : '';
            var ackInfo = row.ack ? '<span data-container="body" data-toggle="popover" data-content="Ack by ' + escapeHtml(row.ack_by) + ' at ' + escapeHtml(row.ack_at) + '"><i class="fas fa-info-circle text-primary"></i></span>' : '';
            var percentLabel = row.percent_down >= 10 ? '<span class="text-danger">' + escapeHtml(row.percent_down) + '%</span>' : escapeHtml(row.percent_down) + '%';
            html += '<tr>' +
                '<td><div class="form-group float-left m-0"><div class="custom-control custom-switch"><input type="checkbox" class="custom-control-input ack-switch" id="ack-switch-' + row.id + '" data-url="' + escapeHtml(row.ack_url) + '"' + ackChecked + '><label class="custom-control-label" for="ack-switch-' + row.id + '"></label></div></div>' + ackInfo + '</td>' +
                '<td><span class="font-weight-bold mr-2"><a href="' + escapeHtml(row.summary_url) + '"><i class="fas fa-building"></i> ' + escapeHtml(row.name) + '</a></span>' + renderSummaryComment(row) + '</td>' +
                '<td>' + escapeHtml(row.total_count) + '</td>' +
                '<td>' + percentLabel + '</td>' +
                '<td>' + escapeHtml(row.last_event) + '</td>' +
                renderTrendCell(row.trend) +
                renderIncidentCell(row.incident, 'summary_' + row.id, '') +
                '</tr>';
        }
        html += '</tbody></table>';
        return html;
    }

    function renderTrapCard(card) {
        var rows = card.rows || [];
        var html = '<table class="table table-hover table-sm m-0"><thead><tr><th>Ack</th><th>Device</th><th>Trap</th><th>Last</th><th>Incident</th><th>Clear</th></tr></thead><tbody>';
        for (var i = 0; i < rows.length; i++) {
            var row = rows[i];
            var ackChecked = row.ack ? ' checked' : '';
            var ackInfo = row.ack ? '<span data-container="body" data-toggle="popover" data-content="Ack by ' + escapeHtml(row.ack_by) + ' at ' + escapeHtml(row.ack_at) + '"><i class="fas fa-info-circle text-primary"></i></span>' : '';
            var dupBadge = '';
            if (row.dup_count > 0) {
                dupBadge = '<span class="float-right badge bg-primary dup-data" data-last="' + escapeHtml(row.dup_last_iso) + '">' + escapeHtml(row.dup_count) + ' dup</span>';
            }
            html += '<tr>' +
                '<td><div class="form-group float-left m-0"><div class="custom-control custom-switch"><input type="checkbox" class="custom-control-input ack-trap" id="ack-switch-' + row.id + '" data-url="' + escapeHtml(row.ack_url) + '"' + ackChecked + '><label class="custom-control-label" for="ack-switch-' + row.id + '"></label></div></div>' + ackInfo + '</td>' +
                '<td><a href="' + escapeHtml(row.device_url) + '">' + escapeHtml(row.device_name) + '</a></td>' +
                '<td><a href="' + escapeHtml(row.trap_url) + '">' + escapeHtml(row.trap_oid) + '</a>' + dupBadge + '</td>' +
                '<td>' + escapeHtml(row.last_event) + '</td>' +
                renderIncidentCell(row.incident, 'trap_' + row.id, '') +
                '<td><button type="button" class="btn btn-primary btn-sm trap-clear" data-url="' + escapeHtml(row.clear_url) + '">Clear</button></td>' +
                '</tr>';
        }
        html += '</tbody></table>';
        if (card.total_open > 30) {
            html += "<p class=\"text-center\">Only displaying 30 of the most recent " + escapeHtml(card.total_open) + " open traps. <a href=\"{% url 'recent_traps' %}\">View all traps.</a></p>";
        }
        return html;
    }

    function renderCardHtml(cardId, card) {
        if (cardId === 'crit_card') {
            return renderCritCard(card);
        }
        if (cardId === 'bldg_card') {
            return renderBldgCard(card);
        }
        if (cardId === 'spec_card') {
            return renderSpecCard(card);
        }
        if (cardId === 'trap_card') {
            return renderTrapCard(card);
        }
        return '';
    }

    function refresh_cards() {
        var overlay = '<div class="overlay"><i class="fas fa-2x fa-sync-alt fa-spin"></i></div>';
        var cardsUrl = $('#myForm').data('cards-url');
        var signatures = window.dashboardCardSignatures || {};
        window.dashboardCardSignatures = signatures;
        var cardSignatureDebug = false;
        var changedCards = [];

        // Enable debug logging with either:
        // 1) URL param: ?cardSigDebug=1
        // 2) localStorage: dashboardCardSignatureDebug=1
        if (window.location.search.indexOf('cardSigDebug=1') !== -1) {
            cardSignatureDebug = true;
        }
        try {
            if (window.localStorage && window.localStorage.getItem('dashboardCardSignatureDebug') === '1') {
                cardSignatureDebug = true;
            }
        } catch (e) {
            // Ignore localStorage access errors
        }

        // Close any open popovers before refreshing the display
        $(".popover").popover('hide');

        $('.event-card').each(function () {
            var body = $(this).find('.card-body');
            body.data('previous-html', body.html());
            body.append(overlay);
        });

        $.ajax({
            type: 'GET',
            url: cardsUrl,
            dataType: 'json',
            data: {},
            success: function (result) {
                var cards = result['cards'] || {};
                var newSignatures = result['signatures'] || {};
                $('.event-card').each(function () {
                    var id = this.id;
                    var body = $(this).find('.card-body');
                    var card = cards[id] || { rows: [], has_rows: false };
                    var signature = newSignatures[id] || '';

                    if (signatures[id] !== signature) {
                        body.html(renderCardHtml(id, card));
                        changedCards.push(id);
                        signatures[id] = signature;
                    }

                    if (id === 'bldg_card' || card.has_rows) {
                        $('#' + id).show();
                    } else {
                        $('#' + id).hide();
                    }
                });

                if (cardSignatureDebug) {
                    if (changedCards.length > 0) {
                        console.log('Dashboard card signatures changed:', changedCards.join(', '));
                    } else {
                        console.log('Dashboard card signatures unchanged');
                    }
                }

                refresh_duplicates();
            },
            error: function (xhr, status, error) {
                $('.event-card').each(function () {
                    var body = $(this).find('.card-body');
                    var previous = body.data('previous-html') || '';
                    body.html(previous);
                    body.append('<div class="overlay text-danger">Failed to get update: ' + error + '</div>');
                });
            },
            complete: function () {
                $('.event-card .card-body').each(function () {
                    $(this).find('.overlay').remove();
                    $(this).removeData('previous-html');
                });
            }
        });

        // voice_alert();
        alert_user();

    }
</script>

            }
        });

        // Bind to the document so dynamically added content will still work
        // Configure the Clear Trap button for traps
        $(document).on('click', 'button.trap-clear', function () {
            //$(this).prop('disabled', true);
            var tr = $(this).closest('tr');
            var url = $(this).data("url");
            $.get(url, {})

            tr.css("background-color", "#FF3700");
            tr.fadeOut(400, function () {
                tr.remove();
            });
        });

        // Bind to the document so dynamically added content will still work
        // enable popover
        $('body').popover({
            selector: '[data-toggle="popover"]',
            trigger: 'hover',
            delay: { "hide": 10 }
        });

        // Configure the Clear All Traps button for traps
        // $(document).on('click', 'button.clear_all_traps', function () {
        $('#clear_all_traps').click(function () {
            // var url = $(this).data("url");
            // $.get(url, {})
            $('.trap-clear').each(function (index) {
                var tr = $(this).closest('tr');
                var url = $(this).data("url");
                console.log("clearing trap with " + url)
                $.get(url, {})
                tr.css("background-color", "#FF3700");
                tr.fadeOut(400, function () {
                    tr.remove();
                });
            });
        });

        // Configure the Create Incident button for events and traps
        $('#incident_button').click(function () {
            checked = $("input[name=event]:checked").length;
            if (!checked) {
                $(document).Toasts('create', {
                    class: 'bg-warning',
                    title: 'Manage Incident',
                    body: 'Please select one or more summaries (or traps) to continue with incidents.',
                    autohide: true,
                    delay: 5000
                });
                // alert("Please select one summary to create an incident.");
                return false;
            } else {
                $("#myForm").submit();
            }
        });

        // Configure the Sync Button
        $('#sync_button').click(function () {
            var url = $(this).data("url");
            console.log("requesting data sync " + url)
            $.ajax({
                type: "GET",
                url: url,
                dataType: "json",
                data: {},
                success: function (result, status, xhr) {
                    var message = '';
                    if (result['ping_sync_started']) {
                        message += "Ping status sync started<br>"
                    } else {
                        message += "Ping status sync already running<br>"
                    }
                    if (result['snmp_sync_started']) {
                        message += "SNMP status sync started<br>"
                    } else {
                        message += "SNMP status sync already running<br>"
                    }
                    if (result['ups_sync_started']) {
                        message += "UPS battery sync started<br>"
                    } else {
                        message += "UPS battery sync already running<br>"
                    }
                    if (result['device_sync_started']) {
                        message += "Device sync started<br>"
                    } else {
                        message += "Device sync already running<br>"
                    }
                    $(document).Toasts('create', {
                        class: 'bg-info',
                        title: 'AKiPS Status Refresh',
                        body: message,
                        autohide: true,
                        delay: 30000
                    });
                },
                error: function (xhr, status, error) {
                    console.log("Unable to refresh status");
                }
            });
            // $.get(url, {})
            // $(document).Toasts('create', {
            //     class: 'bg-info',
            //     title: 'AKiPS Status Refresh',
            //     body: 'Ping and SNMP status is being updated from AKiPS.',
            //     autohide: true,
            //     delay: 30000
            // });
        });

        // Populate the page content for the first time
        refresh_cards();
        enable_alert_toggle();
        var chart = setup_chart();

        // Update the refresh counter
        var max_remaining = refresh_seconds;
        var remaining = max_remaining;
        var remainingId = setInterval(function() {
            remaining = remaining - 1;
            if ( $('#refresh-toggle').is(':checked') ) {
                $('#time-remain').text(remaining);
            } else {
                $('#time-remain').text('no');
            }
        }, 1000);

        // Update the dynamic page content on a refresh interval
        var intervalId = window.setInterval(function () {
            remaining = max_remaining;
            if ( $('#refresh-toggle').is(':checked') && $("input[name=comment_text]:focus").length == 0 ) {
                refresh_cards();
                refresh_chart(chart);
            }
        }, refresh_seconds * 1000);

    })
</script>
{% endblock %}
